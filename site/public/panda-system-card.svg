<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Panda consultation system diagram</title>
  <desc id="desc">Three advisor panes feed structured contracts into a Codex integration pane, followed by tests and metrics.</desc>
  <defs>
