    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1280" height="820" rx="24" fill="url(#bg)"/>
  <g opacity="0.32">
