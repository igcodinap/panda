      <text x="1067" y="386" fill="#f6bfd0" font-family="SFMono-Regular, Consolas, monospace" font-size="13" text-anchor="middle">reject</text>
      <text x="912" y="472" fill="#73807c" font-family="SFMono-Regular, Consolas, monospace" font-size="14">one editor, one integrator</text>
